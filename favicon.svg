<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- fondo · color "night" del sitio -->
  <rect width="32" height="32" rx="6" fill="#07090d"/>

  <!--
    Glider de Conway · 5 células que se desplazan en diagonal.
    Patrón canónico (3x3 grid):
        . X .
        . . X
        X X X
    Cada célula es un cuadrado de 7×7 con 1px de aire entre ellas,
    colocadas sobre la mitad inferior-derecha para sugerir movimiento NW→SE.
  -->
  <g fill="#e09558">
    <rect x="12" y="5"  width="7" height="7" rx="1"/>
    <rect x="20" y="13" width="7" height="7" rx="1"/>
    <rect x="4"  y="21" width="7" height="7" rx="1"/>
    <rect x="12" y="21" width="7" height="7" rx="1"/>
    <rect x="20" y="21" width="7" height="7" rx="1"/>
  </g>
</svg>
